<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a1a">
    <title>Marginalia</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <div id="app">
        <!-- Library view -->
        <div id="library" class="view active">
            <div id="library-header">
                <h1>Marginalia <span id="version-label"></span></h1>
                <div id="library-header-right">
                    <button id="btn-new-folder" title="New folder">📁+</button>
                    <button id="btn-settings" title="Settings">&#9881;</button>
                </div>
            </div>
            <div id="book-list"></div>
            <label class="upload-btn">
                Upload PDF
                <input type="file" accept=".pdf" id="upload-input" hidden>
            </label>
        </div>

        <!-- Settings modal -->
        <div id="settings-overlay" class="overlay hidden">
            <div id="settings-modal" class="modal">
                <h2>Settings</h2>
                <label>
                    OpenRouter API Key
                    <input type="password" id="settings-api-key" placeholder="sk-or-v1-...">
                </label>
                <label>
                    Model
                    <input type="text" id="settings-model" placeholder="x-ai/grok-4.1-fast">
                </label>
                <hr class="modal-divider">
                <label class="checkbox-label">
                    <input type="checkbox" id="settings-auto-compact" checked>
                    Auto-compact conversation
                </label>
                <label>
                    Compact threshold (tokens)
                    <input type="number" id="settings-compact-threshold" value="50000" min="10000" step="5000">
                </label>
                <div class="modal-buttons">
                    <button id="btn-settings-save">Save</button>
                    <button id="btn-settings-cancel">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="db.js" defer></script>
    <script src="app.js" defer></script>
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js").then((reg) => {
                reg.update();
                setInterval(() => reg.update(), 5 * 60 * 1000);
            });
            // Reload when a new SW takes over
            navigator.serviceWorker.addEventListener("controllerchange", () => {
                location.reload();
            });
        }
    </script>
</body>
</html>
