<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Marginalia</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- Book list (shown when no book is open) -->
        <div id="library" class="view active">
            <h1>Marginalia</h1>
            <div id="book-list"></div>
            <label class="upload-btn">
                Upload PDF
                <input type="file" accept=".pdf" id="upload-input" hidden>
            </label>
        </div>

        <!-- Reader (shown when a book is open) -->
        <div id="reader" class="view">
            <div id="reader-toolbar">
                <button id="btn-back">&larr;</button>
                <span id="reader-title"></span>
                <button id="btn-chat">Chat</button>
            </div>
            <div id="pdf-container">
                <canvas id="pdf-canvas"></canvas>
            </div>
            <div id="page-nav">
                <button id="btn-prev">&lsaquo;</button>
                <span id="page-info"></span>
                <button id="btn-next">&rsaquo;</button>
            </div>
        </div>

        <!-- Chat panel (slides over reader) -->
        <div id="chat-panel">
            <div id="chat-header">
                <span>Chat</span>
                <button id="btn-close-chat">&times;</button>
            </div>
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <textarea id="chat-input" placeholder="Ask about this page..."></textarea>
                <button id="btn-send">Send</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.min.mjs" type="module"></script>
    <script src="/static/app.js" type="module"></script>
</body>
</html>
